# Whanos Azure Infrastructure Inventory
# Replace <YOUR_IP> with your actual Azure VM public IP addresses
[jenkins_server]
whanos-services ansible_host=<YOUR_JENKINS_IP> ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/id_rsa

[docker_registry] 
whanos-services ansible_host=<YOUR_REGISTRY_IP> ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/id_rsa

[kubernetes_cluster]
whanos-services ansible_host=<YOUR_CONTROL_PLANE_IP> ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/id_rsa
whanos-k8s-worker ansible_host=<YOUR_WORKER_IP> ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/id_rsa

[kube_control_plane]
whanos-services

[kube_node] 
whanos-k8s-worker

[etcd]
whanos-services

[k8s_cluster:children]
kube_control_plane
kube_node

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
